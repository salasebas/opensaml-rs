[workspace]
release_always = false
dependencies_update = false
pr_labels = ["release"]
pr_name = "release: saml-rs{% if version %} v{{ version }}{% endif %}"
git_tag_enable = false
git_release_enable = false
semver_check = false

[[package]]
name = "saml-rs"
version_group = "saml-rs"
changelog_path = "CHANGELOG.md"
changelog_include = ["opensaml", "samlify", "rustsaml", "samlet"]
git_tag_enable = true
git_tag_name = "v{{ version }}"
git_release_enable = true
git_release_name = "saml-rs v{{ version }}"
semver_check = true

[[package]]
name = "opensaml"
version_group = "saml-rs"
changelog_update = false
git_tag_enable = false
git_release_enable = false
semver_check = false

[[package]]
name = "samlify"
version_group = "saml-rs"
changelog_update = false
git_tag_enable = false
git_release_enable = false
semver_check = false

[[package]]
name = "rustsaml"
version_group = "saml-rs"
changelog_update = false
git_tag_enable = false
git_release_enable = false
semver_check = false

[[package]]
name = "samlet"
version_group = "saml-rs"
changelog_update = false
git_tag_enable = false
git_release_enable = false
semver_check = false
