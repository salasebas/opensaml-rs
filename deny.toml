[advisories]
ignore = [
    # Transitive through bergshamra 0.6.3 / kryptering 0.4.1's rsa dependency.
    # RustSec currently lists no safe upgrade; keep this explicit while
    # saml-rs's software RSA XML-Enc key transport path remains gated off by default.
    { id = "RUSTSEC-2023-0071", reason = "Transitive through bergshamra/kryptering; no safe upgrade is currently available, and saml-rs gates software RSA XML-Enc key transport by default." },
]

[licenses]
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-workspace = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
