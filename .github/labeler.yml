# Path-based PR labels for actions/labeler.

area:core:
  - changed-files:
      - any-glob-to-any-file:
          - "source/*.rs"

area:bindings:
  - changed-files:
      - any-glob-to-any-file:
          - "source/binding/**"

area:xml:
  - changed-files:
      - any-glob-to-any-file:
          - "source/xml/**"

area:crypto:
  - changed-files:
      - any-glob-to-any-file:
          - "source/crypto/**"

area:metadata:
  - changed-files:
      - any-glob-to-any-file:
          - "source/metadata/**"

area:flow:
  - changed-files:
      - any-glob-to-any-file:
          - "source/entity.rs"
          - "source/flow.rs"
          - "source/idp.rs"
          - "source/sp.rs"

area:logout:
  - changed-files:
      - any-glob-to-any-file:
          - "source/logout.rs"

rust:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.rs"
          - "**/Cargo.toml"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"

fixtures:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/fixtures/**"

security:
  - changed-files:
      - any-glob-to-any-file:
          - "SECURITY.md"
          - "deny.toml"
          - "source/crypto/**"
          - "tests/hardening.rs"
          - "tests/xsw.rs"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "source/**/*.rs"

release:
  - changed-files:
      - any-glob-to-any-file:
          - "CHANGELOG.md"
          - "RELEASE.md"
          - "release-plz.toml"
          - ".github/workflows/release-plz.yml"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "Cargo.lock"
          - "**/Cargo.toml"
          - ".github/dependabot.yml"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "deny.toml"
          - "lefthook.yml"
          - "rust-toolchain.toml"
          - "rustfmt.toml"
          - "clippy.toml"
