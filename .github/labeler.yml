# Path-based PR labels for actions/labeler.

area:core:
  - changed-files:
      - any-glob-to-any-file:
          - "src/*.rs"

area:bindings:
  - changed-files:
      - any-glob-to-any-file:
          - "src/binding/**"

area:xml:
  - changed-files:
      - any-glob-to-any-file:
          - "src/xml/**"

area:crypto:
  - changed-files:
      - any-glob-to-any-file:
          - "src/crypto/**"

area:metadata:
  - changed-files:
      - any-glob-to-any-file:
          - "src/metadata/**"

area:flow:
  - changed-files:
      - any-glob-to-any-file:
          - "src/entity.rs"
          - "src/flow.rs"
          - "src/idp.rs"
          - "src/sp.rs"

area:logout:
  - changed-files:
      - any-glob-to-any-file:
          - "src/logout.rs"

rust:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.rs"
          - "**/Cargo.toml"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"

fixtures:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/fixtures/**"

security:
  - changed-files:
      - any-glob-to-any-file:
          - "SECURITY.md"
          - "deny.toml"
          - "src/crypto/**"
          - "tests/hardening.rs"
          - "tests/xsw.rs"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - "src/**/*.rs"

release:
  - changed-files:
      - any-glob-to-any-file:
          - "CHANGELOG.md"
          - "RELEASE.md"
          - "release-plz.toml"
          - ".github/workflows/release-plz.yml"

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "Cargo.lock"
          - "**/Cargo.toml"
          - ".github/dependabot.yml"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "deny.toml"
          - "lefthook.yml"
          - "rust-toolchain.toml"
          - "rustfmt.toml"
          - "clippy.toml"
