version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 5
    groups:
      cargo-xml-parser:
        applies-to: version-updates
        patterns:
          - "quick-xml"
      cargo-xml-crypto:
        applies-to: version-updates
        patterns:
          - "bergshamra*"
          - "kryptering"
          - "rsa"
          - "crypto-bigint"
          - "x509-cert"
          - "der"
          - "signature"
          - "digest"
      cargo-maintenance:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "quick-xml"
          - "bergshamra*"
          - "kryptering"
          - "rsa"
          - "crypto-bigint"
          - "x509-cert"
          - "der"
          - "signature"
          - "digest"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
