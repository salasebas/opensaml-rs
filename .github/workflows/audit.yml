name: Security Audit

on:
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  push:
    branches:
      - main
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: audit-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
