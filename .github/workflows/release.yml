name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  crates-io:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Validate tag matches workspace version
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "opensaml") | .version')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match workspace version $version"
            exit 1
          fi

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "opensaml") | .version')"
          # opensaml must publish before samlify (samlify depends on it).
          crates=(opensaml samlify)

          crate_version_exists() {
            local status
            status="$(curl --silent --output /dev/null --write-out "%{http_code}" "https://crates.io/api/v1/crates/$1/${version}")"
            [ "$status" = "200" ]
          }

          wait_for_crate_version() {
            for attempt in {1..40}; do
              crate_version_exists "$1" && return 0
              echo "Waiting for $1 ${version} on crates.io (${attempt}/40)"
              sleep 15
            done
            echo "$1 ${version} was not visible on crates.io after publishing"
            return 1
          }

          for crate in "${crates[@]}"; do
            if crate_version_exists "$crate"; then
              echo "Skipping $crate ${version}; it already exists on crates.io"
              continue
            fi
            cargo publish -p "$crate"
            wait_for_crate_version "$crate"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
