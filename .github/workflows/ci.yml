name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  feature-check:
    name: Feature check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p opensaml --no-default-features

  semver:
    name: Semver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: opensaml
          release-type: minor

  test:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      # Abort the whole matrix as soon as one package fails.
      fail-fast: true
      matrix:
        package:
          - opensaml
          - open-saml
          - rust-saml
          - rustsaml
          - saml-rs
          - samlify
          - samlrs
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run -p ${{ matrix.package }}
      - run: cargo test -p ${{ matrix.package }} --doc

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy
      - feature-check
      - semver
      - test
    if: always()
    steps:
      - name: Check required jobs
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
